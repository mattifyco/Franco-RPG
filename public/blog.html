<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Franco RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .post-detail {
      display: none;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 1rem;
      padding: 2rem;
      margin-top: 2rem;
    }
    .post-detail.active {
      display: block;
    }
    .post-detail-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .post-detail-title {
      color: var(--color-gold);
      font-family: var(--font-display);
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .post-detail-content {
      font-family: 'Crimson Text', serif;
      font-size: 1.2rem;
      line-height: 1.6;
      color: var(--color-text);
      white-space: pre-wrap;
    }
    .btn-back {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--color-gold);
      cursor: pointer;
      font-weight: 700;
    }
    .blog-card {
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .blog-card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="/" class="logo">
          <span class="logo-icon">⚔️</span>
          <span class="logo-text">FRANCO<span class="logo-rpg">RPG</span></span>
        </a>
        
        <div class="nav-links">
          <a href="/" class="nav-link">Início</a>
          <a href="/mesas" class="nav-link">Mesas</a>
          <a href="/herois" class="nav-link">Nossos Heróis</a>
          <a href="/blog" class="nav-link active">Blog</a>
        </div>

        <div class="nav-auth">
          <button class="btn-login" onclick="openLoginModal()">Entrar</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" style="min-height: 40vh;">
    <div class="hero-bg">
      <div class="hero-gradient"></div>
      <div class="hero-overlay"></div>
      <video autoplay muted loop playsinline class="hero-video">
        <source src="/vid/tavern.mp4" type="video/mp4">
      </video>
    </div>
    <div class="container hero-content">
      <div class="hero-text">
        <h1 class="hero-title">Blog Franco RPG</h1>
        <p class="hero-subtitle">Notícias, dicas e histórias do mundo do RPG</p>
      </div>
    </div>
  </section>

  <!-- Blog Section -->
  <section class="section">
    <div class="container">
      <div id="blogListSection">
        

        <div class="blog-grid" id="blogContainer">
          
          <div class="loading">Carregando postagens...</div>
        </div>
      </div>

      <div id="postDetailSection" class="post-detail">
        <span class="btn-back" onclick="showBlogList()">← Voltar para o Blog</span>
        <div id="postContentArea"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Franco RPG. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    async function loadBlog() {
      try {
        console.log('Carregando blog...');
        const response = await fetch('/api/blog');
        if (!response.ok) throw new Error('Erro ao buscar posts');
        const posts = await response.json();
        console.log('Posts carregados:', posts);
        const container = document.getElementById('blogContainer');

        if (!posts || posts.length === 0) {
          container.innerHTML = '<p class="loading">Nenhuma postagem disponível no momento</p>';
          return;
        }

        container.innerHTML = posts.map(post => `
          <div class="blog-card" onclick="viewPost('${post.slug}')">
            <div class="blog-image">
              ${post.cover_image ? `<img src="${post.cover_image}" style="width:100%; height:100%; object-fit:cover;">` : '📖'}
            </div>
            <div class="blog-content">
              <span class="blog-category">${post.category || 'Geral'}</span>
              <h3 class="blog-title">${post.title}</h3>
              <p class="blog-excerpt">${post.excerpt || ''}</p>
              <div class="blog-meta">
                <span>${new Date(post.published_at).toLocaleDateString('pt-BR')}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error(error);
      }
    }

    async function viewPost(slug) {
      try {
        const response = await fetch(`/api/blog/${slug}`);
        const post = await response.json();
        
        const area = document.getElementById('postContentArea');
        area.innerHTML = `
          ${post.cover_image ? `<img src="${post.cover_image}" class="post-detail-image">` : ''}
          <h1 class="post-detail-title">${post.title}</h1>
          <div class="blog-meta" style="margin-bottom: 2rem;">
            <span>Por ${post.author_name}</span> | 
            <span>${new Date(post.published_at).toLocaleDateString('pt-BR')}</span>
          </div>
          <div class="post-detail-content">${post.content}</div>
        `;

        document.getElementById('blogListSection').style.display = 'none';
        document.getElementById('postDetailSection').classList.add('active');
        window.scrollTo(0, 0);
      } catch (error) {
        console.error(error);
      }
    }

    function showBlogList() {
      document.getElementById('blogListSection').style.display = 'block';
      document.getElementById('postDetailSection').classList.remove('active');
    }

    document.addEventListener('DOMContentLoaded', loadBlog);
  </script>
</body>
</html>
